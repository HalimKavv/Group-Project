<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}LuckyNest CRM{% endblock %}</title> 
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="logo">✨ LuckyNest</a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="#features">Features</a>
            <a href="#pricing">Pricing</a> 
            <a href="{{ url_for('register') }}" class="btn-register">Register</a>
            <a href="#" class="btn-login">Login</a>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 LuckyNest CRM Group Project. All rights reserved.</p>
    </footer>

</body>
</html>
